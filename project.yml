name: AirliveBridge
options:
  bundleIdPrefix: studio.airlive.bridge
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

# Sparkle — seamless auto-update framework (download → verify EdDSA → replace in
# place → relaunch).  Updates are signed with an EdDSA key (private in the Keychain,
# public in Info.plist SUPublicEDKey); the app checks the appcast at SUFeedURL.
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

targets:
  AirliveBridge:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Airlive Bridge
        # Single version source: MARKETING_VERSION (settings below).  Substituted by
        # Xcode at build; the window title reads it via CFBundleShortVersionString.
        # MUST live here, not as a hand-edit to the plist (xcodegen wipes those).
        CFBundleShortVersionString: $(MARKETING_VERSION)
        # Build number Sparkle COMPARES to decide "is there a newer build" (NOT the
        # marketing string).  Driven by CURRENT_PROJECT_VERSION (settings.base) so it
        # lives in one place; MUST strictly increment every release and MUST equal the
        # appcast item's sparkle:version.
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # --- Sparkle auto-update ---
        # Appcast feed.  PLACEHOLDER — decide the FINAL permanent host before the first
        # public release: it's baked into every shipped build and can NEVER change (a
        # later change orphans older installs).  Tiny XML on the site you own; the big
        # .dmg is served by GitHub Releases (the enclosure url).
        SUFeedURL: "https://airlive.studio/bridge/appcast.xml"
        # base64 Ed25519 PUBLIC key from `generate_keys` (44 chars, ends "=").  The
        # private key stays in the login Keychain, NEVER committed.  PLACEHOLDER until
        # generate_keys is run — package.sh REFUSES to ship a release while this is the
        # placeholder (a build with no real key has no update-trust anchor).
        SUPublicEDKey: "REPLACE_WITH_generate_keys_OUTPUT="
        # Silent scheduled background checks: OFF for now (manual "Check for Updates…"
        # only) — a non-sandboxed, library-validation-disabled tool auto-installing
        # updates unattended is a high-value target, so we enable background checks
        # only AFTER the signing pipeline is proven end-to-end (see docs/RELEASE.md).
        SUEnableAutomaticChecks: false
        # Points the Dock/Finder at the asset-catalog AppIcon.  MUST live here: xcodegen
        # regenerates Sources/Info.plist from these properties, so a hand-edit to the plist
        # is wiped on the next `xcodegen` — which is why the icon never stuck before.
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "13.0"
        # A video-production / broadcast tool → the Video category in Finder / Spotlight.
        LSApplicationCategoryType: "public.app-category.video"
        # About panel + Get Info.  Set the real legal entity if it's not just "Airlive".
        NSHumanReadableCopyright: "Copyright © 2026 Airlive. All rights reserved."
        # Local-network access is needed twice: to receive the iPhone stream
        # (_airlive._tcp) AND for NDI's mDNS discovery (_ndi._tcp) — without the
        # NDI service type declared, macOS can block the NDI source from being
        # discovered by receivers like OBS/DistroAV.
        NSLocalNetworkUsageDescription: "Airlive Bridge uses the local network to find and receive video from Airlive Camera, and to republish it to receivers such as OBS and NDI."
        # Capturing a UVC/HDMI capture card (the "HDMI / USB Capture" source) goes
        # through AVFoundation, which needs the camera-access usage string + grant.
        NSCameraUsageDescription: "Airlive Bridge needs camera access to capture video from a connected HDMI or USB capture device (such as a capture card)."
        NSBonjourServices:
          - _airlive._tcp
          - _ndi._tcp
          # AirPlay Screen Mirroring receiver advertises as an Apple TV.
          - _airplay._tcp
          - _raop._tcp
    # System frameworks for the AirPlay receiver's VideoToolbox decode path.
    dependencies:
      - sdk: VideoToolbox.framework
      - sdk: CoreMedia.framework
      - sdk: CoreVideo.framework
      - package: Sparkle   # auto-update (see packages: above)
    settings:
      base:
        PRODUCT_NAME: Airlive Bridge
        MARKETING_VERSION: "1.0.0"   # semver: MAJOR.MINOR.PATCH — bump like a real release train
        # Sparkle's compare key (→ CFBundleVersion).  Strictly increment EVERY release
        # (1 → 2 → 3 …) and mirror it in the appcast item's sparkle:version.
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        # Apple Silicon only — the vendored UxPlay/openssl/libplist static libs are arm64.
        # A bare `ARCHS: arm64` gets DROPPED by xcodegen (never lands in the pbxproj), so an
        # Xcode build with ONLY_ACTIVE_ARCH=NO also targets x86_64 and the link fails with
        # "Undefined symbol _raop_* / _dnssd_*" (arm64 libs ignored for the x86_64 slice).
        # EXCLUDED_ARCHS reliably lands and forces an arm64-only link in BOTH Debug & Release.
        ARCHS: "arm64"
        EXCLUDED_ARCHS: x86_64
        ONLY_ACTIVE_ARCH: "NO"
        # App icon (populate the .appiconset with scripts/make-icon.sh once the
        # logo PNG exists; an empty set just builds without an icon meanwhile).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Notarized-distribution requirements (used by scripts/package.sh; harmless
        # for unsigned debug builds, which pass CODE_SIGNING_ALLOWED=NO):
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AirliveBridge.entitlements
        # Stable signing identity (David Evsyukov Personal Team) — REQUIRED for macOS
        # Local Network privacy: an ad-hoc-signed app can't be granted Local Network,
        # so Bonjour PUBLISHING (Airlive channels + AirPlay _raop/_airplay) is denied
        # (-65555 / -72008). A real Team gives TCC a stable identity to grant + persist.
        DEVELOPMENT_TEAM: XWBJP49FTR
        CODE_SIGN_STYLE: Automatic
        # --- AirPlay receiver (Sources/AirPlay + vendored UxPlay static libs) ---
        # Build the libs first: scripts/build-airplay-lib.sh (brew cmake openssl@3 libplist).
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/AirliveBridge-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendor/airplay-lib/include
          # openssl + libplist headers, from our macOS-13 source build (scripts/build-deps.sh)
          - $(SRCROOT)/Vendor/deps/include
        OTHER_LDFLAGS:
          - $(SRCROOT)/Vendor/airplay-lib/lib/libairplay.a
          - $(SRCROOT)/Vendor/airplay-lib/lib/libplayfair.a
          - $(SRCROOT)/Vendor/airplay-lib/lib/libdnssd.a
          - $(SRCROOT)/Vendor/airplay-lib/lib/libllhttp.a
          # libcrypto + libplist rebuilt at min-macOS 13 (NOT Homebrew's host-OS build)
          # so the link is warning-clean and the app runs on every supported macOS.
          - $(SRCROOT)/Vendor/deps/lib/libcrypto.a
          - $(SRCROOT)/Vendor/deps/lib/libplist-2.0.a

schemes:
  AirliveBridge:
    build:
      targets:
        AirliveBridge: all
    run:
      config: Debug
    archive:
      config: Release

# Dependencies added per phase, not up front:
#   - HaishinKit (RTMP/SRT output) — phase 3
#   - NDI SDK (xcframework / system lib) — phase 2
#   - RTSP muxer — phase 3
# The wire format (AirlivePacket/PacketParser/ControlMessage/StateSnapshot) is a
# standalone COPY under Sources/Wire (never references the airlive repo directly).
