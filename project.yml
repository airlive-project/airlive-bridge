name: AirliveBridge
options:
  bundleIdPrefix: studio.airlive.bridge
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  AirliveBridge:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Airlive Bridge
        LSMinimumSystemVersion: "13.0"
        # Local-network access is needed twice: to receive the iPhone stream
        # (_airlive._tcp) AND for NDI's mDNS discovery (_ndi._tcp) — without the
        # NDI service type declared, macOS can block the NDI source from being
        # discovered by receivers like OBS/DistroAV.
        NSLocalNetworkUsageDescription: "Airlive Bridge discovers Airlive Camera streams and publishes NDI on your local network."
        # Capturing a UVC/HDMI capture card (the "HDMI / USB Capture" source) goes
        # through AVFoundation, which needs the camera-access usage string + grant.
        NSCameraUsageDescription: "Airlive Bridge captures video from connected HDMI / USB capture devices."
        NSBonjourServices:
          - _airlive._tcp
          - _ndi._tcp
    settings:
      base:
        PRODUCT_NAME: Airlive Bridge
        MARKETING_VERSION: "0.1.0"
        SWIFT_VERSION: "5.9"
        # App icon (populate the .appiconset with scripts/make-icon.sh once the
        # logo PNG exists; an empty set just builds without an icon meanwhile).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Notarized-distribution requirements (used by scripts/package.sh; harmless
        # for unsigned debug builds, which pass CODE_SIGNING_ALLOWED=NO):
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AirliveBridge.entitlements

# Dependencies added per phase, not up front:
#   - HaishinKit (RTMP/SRT output) — phase 3
#   - NDI SDK (xcframework / system lib) — phase 2
#   - RTSP muxer — phase 3
# The wire format (AirlivePacket/PacketParser/ControlMessage/StateSnapshot) is a
# standalone COPY under Sources/Wire (never references the airlive repo directly).
